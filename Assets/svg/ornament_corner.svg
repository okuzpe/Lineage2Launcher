<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Ornamental corner decoration for frame -->
  <defs>
    <linearGradient id="cornerGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Corner decoration -->
  <g stroke="url(#cornerGold)" stroke-width="2" fill="none" opacity="0.8">
    <!-- Main corner lines -->
    <line x1="0" y1="0" x2="20" y2="0"/>
    <line x1="0" y1="0" x2="0" y2="20"/>
    
    <!-- Decorative circles -->
    <circle cx="0" cy="0" r="3" fill="#D4AF37" opacity="0.6"/>
    <circle cx="8" cy="0" r="2" fill="#B8860B" opacity="0.5"/>
    <circle cx="0" cy="8" r="2" fill="#B8860B" opacity="0.5"/>
    
    <!-- Decorative diagonal lines -->
    <line x1="5" y1="5" x2="15" y2="15" stroke-width="1" opacity="0.4"/>
  </g>
</svg>


