name: Build and Sign Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test Tests/L2TitanLauncher.Tests.csproj -c Release

      - name: Publish single-file EXE
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-build -o ./publish

      - name: Upload unsigned artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: L2TitanLauncher-unsigned
          path: ./publish/L2TitanLauncher.exe

  sign:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: L2TitanLauncher-unsigned
          path: ./unsigned

      - name: Sign with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORG_ID }}'
          project-slug: 'l2titan-launcher'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe'
          github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: './signed'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./signed/L2TitanLauncher.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-unsigned:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Upload to summary
        run: echo "Build completed. Download the artifact from the Actions tab." >> $GITHUB_STEP_SUMMARY
